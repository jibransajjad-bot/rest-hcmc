<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#1a4fa8;--blue-light:#e8f0fc;--blue-mid:#3b6fd4;
  --bg:#f4f7fb;--border:#dde3ef;--text:#1a2340;--muted:#64748b;
  --success:#15803d;--success-bg:#dcfce7;
  --danger:#dc2626;--danger-bg:#fee2e2;
  --warn:#b45309;--warn-bg:#fef3c7;
  --radius:12px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:var(--blue);color:#fff;padding:0 14px;display:flex;align-items:center;gap:10px;min-height:58px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(26,79,168,.25)}
.topbar-title{flex:1}
.topbar-title h1{font-family:'Playfair Display',serif;font-size:13px;font-weight:600;line-height:1.2}
.topbar-title p{font-size:10px;opacity:.72}
.user-pill{background:rgba(255,255,255,.15);border-radius:20px;padding:4px 11px 4px 6px;display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;border:none;color:#fff;font-family:'DM Sans',sans-serif}
.av{width:26px;height:26px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--blue)}
.content{flex:1;padding:12px;max-width:900px;width:100%;margin:0 auto}
.nav-tabs{display:flex;gap:4px;background:#fff;border-radius:var(--radius);padding:4px;margin-bottom:12px;box-shadow:0 1px 4px rgba(26,79,168,.07);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{flex:1;min-width:58px;padding:7px 2px;border:none;border-radius:8px;background:transparent;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;white-space:nowrap;transition:.12s}
.nav-tab.active{background:var(--blue);color:#fff}
.card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:11px}
.card-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;margin-bottom:11px;display:flex;align-items:center;gap:7px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:11px}
.stat-box{background:var(--blue-light);border-radius:10px;padding:11px;text-align:center}
.stat-val{font-size:22px;font-weight:600;color:var(--blue)}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:1px}
.btn{padding:8px 15px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:.12s}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-mid)}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-warn{background:#d97706;color:#fff}
.btn-outline{background:#fff;color:var(--blue);border:1.5px solid var(--border)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:7px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500}
.badge-success{background:var(--success-bg);color:var(--success)}
.badge-danger{background:var(--danger-bg);color:var(--danger)}
.badge-warn{background:var(--warn-bg);color:var(--warn)}
.badge-info{background:var(--blue-light);color:var(--blue)}
.badge-gray{background:#f1f5f9;color:var(--muted)}
.table-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--blue-light);color:var(--blue);font-weight:600;padding:8px 10px;text-align:left;font-size:11px;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8faff}
input,select,textarea{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:#fff;outline:none;transition:.12s}
input:focus,select:focus,textarea:focus{border-color:var(--blue-mid);box-shadow:0 0 0 3px rgba(59,111,212,.1)}
label{font-size:12px;font-weight:500;color:var(--muted);display:block;margin-bottom:3px}
.form-group{margin-bottom:10px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.gps-box{background:#e8f0fc;border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:9px;font-size:12px;color:var(--blue);margin-bottom:11px}
.gps-dot{width:8px;height:8px;border-radius:50%;background:var(--success);flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.clock-card{border:2px solid var(--blue);border-radius:var(--radius);padding:18px;text-align:center;margin-bottom:11px}
.big-time{font-size:34px;font-weight:600;color:var(--blue);font-family:'Playfair Display',serif;letter-spacing:1px}
.big-date{font-size:12px;color:var(--muted);margin-bottom:12px}
.leave-card{border-left:3px solid var(--blue-mid);border-radius:8px;background:#f8faff;padding:11px 13px;margin-bottom:7px}
.lc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.lc-type{font-size:13px;font-weight:500}
.lc-meta{font-size:11px;color:var(--muted);margin-bottom:2px}
.lc-reason{font-size:12px;color:var(--muted)}
.av-circle{border-radius:50%;background:var(--blue-light);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--blue);flex-shrink:0}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.flex-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.modal-overlay{position:fixed;inset:0;background:rgba(10,20,60,.42);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding:0}
@media(min-width:500px){.modal-overlay{align-items:center;padding:16px}}
.modal{background:#fff;border-radius:18px 18px 0 0;padding:20px;width:100%;max-width:440px;max-height:92vh;overflow-y:auto}
@media(min-width:500px){.modal{border-radius:18px}}
.modal-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px;background:linear-gradient(150deg,#1a4fa8 0%,#0ea5c9 100%)}
.login-card{background:#fff;border-radius:20px;padding:26px;width:100%;max-width:340px}
.login-logo{display:flex;flex-direction:column;align-items:center;gap:7px;margin-bottom:18px}
.login-logo h2{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;text-align:center;line-height:1.3}
.login-logo p{font-size:11px;color:var(--muted);text-align:center}
.role-picker{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:13px}
.role-btn{padding:10px;border-radius:8px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--muted);text-align:center;transition:.12s}
.role-btn.selected{border-color:var(--blue);background:var(--blue-light);color:var(--blue)}
.progress-bar{height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:3px;transition:.3s}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:#1a2340;color:#fff;border-radius:10px;padding:9px 18px;font-size:13px;z-index:300;box-shadow:0 4px 20px rgba(26,35,64,.35);max-width:310px;text-align:center;pointer-events:none}
.section-lbl{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.7px;text-transform:uppercase;margin:12px 0 7px}
.divider{border:none;border-top:1px solid var(--border);margin:12px 0}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.settings-label{font-size:13px;font-weight:500}
.settings-desc{font-size:11px;color:var(--muted);margin-top:1px}
.toggle{position:relative;width:42px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#d1d5db;border-radius:24px;cursor:pointer;transition:.2s}
.toggle-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-slider{background:var(--blue)}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px)}
.emp-card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);padding:13px;margin-bottom:9px}
.pin-display{font-family:'DM Mono',monospace;font-size:16px;font-weight:700;letter-spacing:3px;color:var(--blue);background:var(--blue-light);padding:4px 10px;border-radius:6px}
.danger-zone{border:1.5px solid var(--danger-bg);border-radius:var(--radius);padding:14px;margin-top:10px}
.danger-zone-title{font-size:13px;font-weight:600;color:var(--danger);margin-bottom:8px}
.color-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:5px}
</style>

function loadStorage(key,def){
  try{const v=localStorage.getItem(key);return v?JSON.parse(v):def;}catch(e){return def;}
}
function saveStorage(key,val){

// Save to localStorage AND Firebase
function save(){
  saveStorage('resthmc_settings',S.settings);
  saveStorage('resthmc_users',S.users);
  saveStorage('resthmc_logs',S.logs);
  saveStorage('resthmc_leaves',S.leaves);
  db.collection('resthmc').doc('data').set({
    settings:S.settings,
    users:S.users,
    logs:S.logs,
    leaves:S.leaves,
    updatedAt:Date.now()
  }).catch(e=>console.error('Firebase save error:',e));
}

// Load from Firebase on startup
function initFromFirebase(){
  if(typeof firebase==='undefined'||typeof db==='undefined'){
    console.warn('Firebase not available, using local data');
    render();
    return;
  }
  db.collection('resthmc').doc('data').get()
    .then(snap=>{
      if(snap.exists){
        const d=snap.data();
        if(d.settings)S.settings=d.settings;
        if(d.users)S.users=d.users;
        if(d.logs)S.logs=d.logs;
        if(d.leaves)S.leaves=d.leaves;
        saveStorage('resthmc_settings',S.settings);
        saveStorage('resthmc_users',S.users);
        saveStorage('resthmc_logs',S.logs);
        saveStorage('resthmc_leaves',S.leaves);
      } else {
        save();
      }
      render();
    })
    .catch(e=>{ console.warn('Firebase load failed:',e); render(); });
}

function setLoginRole(r){
  loginRole=r;
  document.getElementById('rb-emp').className='role-btn'+(r==='employee'?' selected':'');
  document.getElementById('rb-adm').className='role-btn'+(r==='admin'?' selected':'');
  const sel=document.getElementById('login-uid');
  if(r==='admin'){
    sel.innerHTML='<option value="admin">Administrator</option>';
  } else {
    const emps=S.users.filter(u=>u.active&&u.role==='employee');
    sel.innerHTML='<option value="">— Select name —</option>'+emps.map(u=>`<option value="${u.id}">${u.name} (${u.dept})</option>`).join('');
  }
}
function doLogin(){
  const pin=document.getElementById('login-pin').value.trim();
  const err=document.getElementById('login-err');
  if(loginRole==='admin'){
    if(pin===S.settings.adminPin){
      err.style.display='none';
      S.user={id:0,name:'Administrator',role:'admin',dept:'Administration',avatar:'AD'};
      S.tab='home';getGPS();render();
    } else {err.style.display='block';err.textContent='Incorrect admin PIN.';}
    return;
  }
  const uid=parseInt(document.getElementById('login-uid').value);
  const u=S.users.find(u=>u.id===uid&&String(u.pin)===String(pin)&&u.active);
  if(u){err.style.display='none';S.user=u;S.tab='home';getGPS();render();}
  else{err.style.display='block';err.textContent='Incorrect PIN or user not found.';}
}
function logout(){S.user=null;S.tab='home';S.modal=null;render();}

// ══════════════════════════════════════════════════════
//  GPS
// ══════════════════════════════════════════════════════
function getGPS(){
  S.gpsLoc=S.settings.gpsLat+'° N, '+S.settings.gpsLng+'° E';
  if(S.settings.requireGPS&&navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      p=>{S.gpsLoc=p.coords.latitude.toFixed(4)+'° N, '+p.coords.longitude.toFixed(4)+'° E';},
      ()=>{}
    );
  }
}

//  TABS ROUTER
// ══════════════════════════════════════════════════════
function tabHTML(){
  switch(S.tab){
    case 'home':return homeTab();
    case 'attendance':return attendanceTab();
    case 'leaves':return leavesTab();
    case 'staff':return staffTab();
    case 'reports':return reportsTab();
    case 'settings':return settingsTab();
  }
  return '';
}
function setTab(t){S.tab=t;document.getElementById('tab-content').innerHTML=tabHTML();if(S.modal){S.modal=null;document.getElementById('modal-root').innerHTML='';}}

  const balance=u.role==='admin'?'—':(u.leaves-u.usedLeaves);
  return `

  :todayLog?`

  <div class="table-wrap" id="att-table">
    ${attendanceTable(logs,isAdmin)}
  </div>
</div>`;

function attendanceTable(logs,isAdmin){
  if(logs.length===0)return '<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px">No records found.</div>';
  return `<table>
  <thead><tr>
    ${isAdmin?'<th>Employee</th>':''}
    <th>Date</th><th>In</th><th>Out</th><th>Hours</th><th>GPS</th><th>Status</th>
    ${isAdmin?'<th></th>':''}
  </tr></thead>
  <tbody>${logs.map(l=>{
    const emp=getUser(l.uid);
    const hrs=l.inTime&&l.outTime?calcHours(l.inTime,l.outTime):'';
    return `<tr>
      ${isAdmin?`<td><div style="display:flex;align-items:center;gap:6px"><div class="av-circle" style="width:24px;height:24px;font-size:9px">${emp?initials(emp.name):'?'}</div>${emp?emp.name:'Unknown'}</div></td>`:''}
      <td>${l.date}</td>
      <td>${l.inTime||'—'}</td>
      <td>${l.outTime||'<span style="color:var(--muted)">—</span>'}</td>
      <td>${hrs?`<span style="font-size:12px;color:var(--success)">${hrs}h</span>`:'—'}</td>
      <td style="font-size:11px;color:var(--muted);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.gps||'—'}</td>
      <td><span class="badge badge-${l.status==='present'?'success':'danger'}">${l.status}</span></td>
      ${isAdmin?`<td><button class="btn btn-sm" style="background:#fee2e2;color:#dc2626;padding:3px 8px" onclick="deleteLog('${l.uid}','${l.date}')">✕</button></td>`:''}
    </tr>`;
  }).join('')}</tbody></table>`;
}
function calcHours(inT,outT){
  const [ih,im]=inT.split(':').map(Number);
  const [oh,om]=outT.split(':').map(Number);
  const mins=(oh*60+om)-(ih*60+im);
  if(mins<=0)return '';
  return (mins/60).toFixed(1);
}
function filterAttendance(v){
  const logs=v==='all'?[...S.logs].reverse():[...S.logs].filter(l=>l.uid===parseInt(v)).reverse();
  document.getElementById('att-table').innerHTML=attendanceTable(logs,true);
}
function deleteLog(uid,date){
  if(!confirm('Delete this attendance record?'))return;
  S.logs=S.logs.filter(l=>!(l.uid===parseInt(uid)&&l.date===date));
  save();showToast('Record deleted.');setTab('attendance');
}

function saveGPSSettings(){
  S.settings.gpsLat=document.getElementById('s-lat').value.trim()||S.settings.gpsLat;

  S.settings.gpsLabel=document.getElementById('s-gpslbl').value.trim()||S.settings.gpsLabel;
  save();showToast('GPS settings saved!');
}
function saveWorkSettings(){
  S.settings.workStartTime=document.getElementById('s-start').value||S.settings.workStartTime;
  S.settings.workEndTime=document.getElementById('s-end').value||S.settings.workEndTime;
  S.settings.annualLeaveQuota=parseInt(document.getElementById('s-quota').value)||S.settings.annualLeaveQuota;
  save();showToast('Work settings saved!');
}
function saveLeaveTypes(){
  const inputs=document.querySelectorAll('[id^="lt-"]');
  S.settings.leaveTypes=[...inputs].map(i=>i.value.trim()).filter(Boolean);
  save();showToast('Leave types saved!');setTab('settings');
}
function addLeaveType(){
  S.settings.leaveTypes.push('New Leave Type');save();setTab('settings');
}
function removeLeaveType(i){
  S.settings.leaveTypes.splice(i,1);save();setTab('settings');
}
function saveAdminPin(){
  const p1=document.getElementById('s-apin').value;
  const p2=document.getElementById('s-apin2').value;
  if(!p1){showToast('Enter a PIN.');return;}
  if(p1!==p2){showToast('PINs do not match!');return;}
  if(p1.length<4){showToast('PIN must be at least 4 digits.');return;}
  S.settings.adminPin=p1;save();showToast('Admin PIN updated!');
}
function exportData(){
  const data={settings:S.settings,users:S.users,logs:S.logs,leaves:S.leaves};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='RESTHMC_backup_'+todayISO()+'.json';a.click();
}
function importDataPrompt(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.users&&d.logs&&d.leaves&&d.settings){
          S.users=d.users;S.logs=d.logs;S.leaves=d.leaves;S.settings=d.settings;
          save();showToast('Data imported!');render();
        } else showToast('Invalid backup file.');
      }catch{showToast('Could not read file.');}
    };r.readAsText(f);
  };inp.click();
}
function resetAttendance(){
  if(!confirm('Delete ALL attendance logs? This cannot be undone.'))return;
  S.logs=[];save();showToast('Attendance cleared.');setTab('settings');
}
function resetAll(){
  if(!confirm('FACTORY RESET: delete all data and restore defaults?'))return;
  S.users=DEFAULT_USERS;S.logs=DEFAULT_LOGS;S.leaves=DEFAULT_LEAVES;S.settings=DEFAULT_SETTINGS;
  save();showToast('App reset to defaults.');render();
}

// ══════════════════════════════════════════════════════
//  CLOCK IN / OUT
// ══════════════════════════════════════════════════════
function doClockIn(){
  const loc=S.gpsLoc||S.settings.gpsLat+'° N, '+S.settings.gpsLng+'° E';
  const t=nowTimeShort();
  S.logs.push({uid:S.user.id,date:todayISO(),inTime:t,outTime:'',gps:loc,status:'present'});
  save();showToast('✓ Clocked in at '+t);setTab('home');
}
function doClockOut(){
  const t=nowTimeShort();
  S.logs=S.logs.map(l=>l.uid===S.user.id&&l.date===todayISO()&&!l.outTime?{...l,outTime:t}:l);
  save();showToast('✓ Clocked out at '+t);setTab('home');
}

// ══════════════════════════════════════════════════════
function modalHTML(){
  switch(S.modal){
    case 'leave':return leaveModalHTML();
    case 'approve':return approveModalHTML();
    case 'addStaff':return addStaffModalHTML();
    case 'editStaff':return editStaffModalHTML();
    case 'addLeaveAdmin':return addLeaveAdminHTML();
  }
  return '';
}
function openModal(name,data={}){S.modal=name;S.modalData=data;document.getElementById('modal-root').innerHTML=modalHTML();}
function closeModal(){S.modal=null;S.modalData={};document.getElementById('modal-root').innerHTML='';}

// — Leave Application Modal —
function openLeaveModal(){openModal('leave',{type:S.settings.leaveTypes[0],from:todayISO(),to:todayISO(),reason:''});}
function leaveModalHTML(){
  const d=S.modalData;
  const from=new Date(d.from||todayISO()),to=new Date(d.to||todayISO());
  const days=diffDays(d.from||todayISO(),d.to||todayISO());
  return `<div class="modal-overlay" onclick="if(event.target.className==='modal-overlay')closeModal()">
  <div class="modal">
    <div class="modal-title">📅 Apply for Leave</div>
    <div class="form-group"><label>Leave Type</label>
      <select onchange="S.modalData.type=this.value">
        ${S.settings.leaveTypes.map(t=>`<option${t===d.type?' selected':''}>${t}</option>`).join('')}
      </select>
    </div>
    <div class="form-row">
      <div class="form-group"><label>From</label><input type="date" value="${d.from||todayISO()}" onchange="S.modalData.from=this.value;refreshLeaveModal()"/></div>
      <div class="form-group"><label>To</label><input type="date" value="${d.to||todayISO()}" onchange="S.modalData.to=this.value;refreshLeaveModal()"/></div>
    </div>
    <div style="background:var(--blue-light);border-radius:7px;padding:7px 12px;font-size:13px;color:var(--blue);margin-bottom:10px">
      Duration: <strong>${days} day${days>1?'s':''}</strong>
    </div>
    <div class="form-group"><label>Reason</label><textarea rows="3" placeholder="Brief reason..." onchange="S.modalData.reason=this.value">${d.reason||''}</textarea></div>
    <div style="display:flex;gap:9px;margin-top:4px">
      <button class="btn btn-outline" style="flex:1;justify-content:center" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" style="flex:1;justify-content:center" onclick="submitLeave()">Submit</button>
    </div>
  </div>

}
function refreshLeaveModal(){document.getElementById('modal-root').innerHTML=modalHTML();}
function submitLeave(){
  const d=S.modalData;
  if(!d.reason||!d.reason.trim()){showToast('Please enter a reason.');return;}
  const days=diffDays(d.from||todayISO(),d.to||todayISO());
  S.leaves.push({id:Date.now(),uid:S.user.id,type:d.type,from:d.from||todayISO(),to:d.to||todayISO(),days,reason:d.reason,status:'pending',applied:todayISO(),note:''});
  save();closeModal();showToast('Leave application submitted!');setTab('leaves');
}

// — Approve/Reject Modal —
function openApproveModal(id,action){openModal('approve',{id,action,note:''});}
function approveModalHTML(){
  const d=S.modalData;
  const leave=S.leaves.find(l=>l.id===d.id);
  const isApprove=d.action==='approved';
  const isReject=d.action==='rejected';
  return `<div class="modal-overlay" onclick="if(event.target.className==='modal-overlay')closeModal()">
  <div class="modal">
    <div class="modal-title">${isApprove?'✓ Approve':isReject?'✗ Reject':'✏️ Add Note'} Leave</div>
    <div class="leave-card" style="border-left-color:var(--blue);margin-bottom:12px">
      <div class="lc-type">${leave.type}</div>
      <div class="lc-meta">${leave.from} → ${leave.to} · ${leave.days} days</div>
      <div class="lc-reason">${leave.reason}</div>
    </div>
    <div class="form-group"><label>Note / Comments (optional)</label><textarea rows="2" placeholder="Add a note for the employee..." onchange="S.modalData.note=this.value"></textarea></div>
    <div style="display:flex;gap:9px;margin-top:4px">
      <button class="btn btn-outline" style="flex:1;justify-content:center" onclick="closeModal()">Cancel</button>
      <button class="btn ${isApprove?'btn-success':isReject?'btn-danger':'btn-primary'}" style="flex:1;justify-content:center" onclick="doApproveLeave()">
        ${isApprove?'Approve':isReject?'Reject':'Save Note'}
      </button>
    </div>
  </div>
</div>`;
}
function doApproveLeave(){
  const d=S.modalData;
  S.leaves=S.leaves.map(l=>l.id===d.id?{...l,status:d.action,note:d.note||l.note}:l);
  save();closeModal();showToast('Leave '+d.action+'!');setTab('leaves');
}

// — Add Staff Modal —
function openAddStaffModal(){openModal('addStaff',{name:'',dept:'',pin:'',leaves:S.settings.annualLeaveQuota});}
function addStaffModalHTML(){
  const d=S.modalData;
  return `<div class="modal-overlay" onclick="if(event.target.className==='modal-overlay')closeModal()">
  <div class="modal">
    <div class="modal-title">👤 Add New Staff Member</div>
    <div class="form-group"><label>Full Name</label><input id="ns-name" value="${d.name}" placeholder="e.g. Dr. Ahmed Ali" onchange="S.modalData.name=this.value"/></div>
    <div class="form-row">
      <div class="form-group"><label>Department</label><input id="ns-dept" value="${d.dept}" placeholder="e.g. Surgery" onchange="S.modalData.dept=this.value"/></div>
      <div class="form-group"><label>PIN (4–8 digits)</label><input type="number" id="ns-pin" value="${d.pin}" placeholder="e.g. 1234" onchange="S.modalData.pin=this.value"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Annual Leave Days</label><input type="number" id="ns-leaves" value="${d.leaves}" min="0" max="60" onchange="S.modalData.leaves=parseInt(this.value)"/></div>
    </div>
    <div style="display:flex;gap:9px;margin-top:4px">
      <button class="btn btn-outline" style="flex:1;justify-content:center" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" style="flex:1;justify-content:center" onclick="addStaff()">Add Staff</button>
    </div>
  </div>
</div>`;
}
function addStaff(){
  const d=S.modalData;
  // Read directly from input fields to avoid onchange timing issue
  const nameVal=(document.getElementById('ns-name')?.value||d.name||'').trim();
  const deptVal=(document.getElementById('ns-dept')?.value||d.dept||'').trim();
  const pinVal=String(document.getElementById('ns-pin')?.value||d.pin||'').trim();
  const leavesVal=parseInt(document.getElementById('ns-leaves')?.value||d.leaves||12);
  if(!nameVal){showToast('Enter a name.');return;}
  if(!deptVal){showToast('Enter a department.');return;}
  if(!pinVal||pinVal.length<4){showToast('PIN must be at least 4 digits.');return;}
  if(S.users.find(u=>String(u.pin)===pinVal)){showToast('This PIN is already in use!');return;}
  const newId=Math.max(0,...S.users.map(u=>u.id))+1;
  S.users.push({id:newId,name:nameVal,dept:deptVal,pin:pinVal,avatar:initials(nameVal),leaves:leavesVal||12,usedLeaves:0,role:'employee',active:true});
  save();closeModal();showToast('Staff member added!');setTab('staff');
}

// — Edit Staff Modal —
function openEditStaffModal(uid){const u=getUser(uid);if(!u)return;openModal('editStaff',{...u});}
function editStaffModalHTML(){
  const d=S.modalData;
  return `<div class="modal-overlay" onclick="if(event.target.className==='modal-overlay')closeModal()">
  <div class="modal">
    <div class="modal-title">✏️ Edit Staff Member</div>
    <div class="form-group"><label>Full Name</label><input id="es-name" value="${d.name}" onchange="S.modalData.name=this.value"/></div>
    <div class="form-row">
      <div class="form-group"><label>Department</label><input id="es-dept" value="${d.dept}" onchange="S.modalData.dept=this.value"/></div>
      <div class="form-group"><label>PIN</label><input type="number" id="es-pin" value="${d.pin}" onchange="S.modalData.pin=String(this.value)"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Total Leave Days</label><input type="number" id="es-leaves" value="${d.leaves}" min="0" max="60" onchange="S.modalData.leaves=parseInt(this.value)"/></div>
      <div class="form-group"><label>Used Leave Days</label><input type="number" id="es-used" value="${d.usedLeaves}" min="0" onchange="S.modalData.usedLeaves=parseInt(this.value)"/></div>
    </div>
    <div class="settings-row">
      <div><div class="settings-label">Account Active</div><div class="settings-desc">Inactive staff cannot log in</div></div>
      <label class="toggle"><input type="checkbox" ${d.active?'checked':''} onchange="S.modalData.active=this.checked"><span class="toggle-slider"></span></label>
    </div>
    <div style="display:flex;gap:9px;margin-top:12px">
      <button class="btn btn-outline" style="flex:1;justify-content:center" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" style="flex:1;justify-content:center" onclick="saveEditStaff()">Save Changes</button>
    </div>
    <div class="danger-zone" style="margin-top:12px">
      <div class="danger-zone-title">⚠ Remove Staff</div>
      <button class="btn btn-danger btn-sm" onclick="removeStaff(${d.id})">Permanently Delete</button>
    </div>
  </div>
</div>`;
}
function saveEditStaff(){
  const d=S.modalData;
  // Read directly from input fields to avoid onchange timing issue
  const nameVal=(document.getElementById('es-name')?.value||d.name||'').trim();
  const deptVal=(document.getElementById('es-dept')?.value||d.dept||'').trim();
  const pinVal=String(document.getElementById('es-pin')?.value||d.pin||'').trim();
  const leavesVal=parseInt(document.getElementById('es-leaves')?.value||d.leaves||12);
  const usedVal=parseInt(document.getElementById('es-used')?.value||d.usedLeaves||0);
  if(!nameVal){showToast('Name cannot be empty.');return;}
  if(pinVal.length<4){showToast('PIN must be at least 4 digits.');return;}
  const dup=S.users.find(u=>String(u.pin)===pinVal&&u.id!==d.id);
  if(dup){showToast('PIN already used by '+dup.name);return;}
  S.users=S.users.map(u=>u.id===d.id?{...u,name:nameVal,dept:deptVal,pin:pinVal,leaves:leavesVal,usedLeaves:usedVal,active:d.active,avatar:initials(nameVal)}:u);
  save();closeModal();showToast('Staff updated!');setTab('staff');
}
function removeStaff(uid){
  if(!confirm('Permanently remove this staff member and all their records?'))return;
  S.users=S.users.filter(u=>u.id!==uid);
  S.logs=S.logs.filter(l=>l.uid!==uid);
  S.leaves=S.leaves.filter(l=>l.uid!==uid);
  save();closeModal();showToast('Staff removed.');setTab('staff');
}

    <div style="display:flex;gap:9px;margin-top:4px">

</div>`;
}
function adminAddLeave(){
  const d=S.modalData;
  if(!d.reason.trim()){showToast('Enter a reason.');return;}
  const days=diffDays(d.from,d.to);
  S.leaves.push({id:Date.now(),uid:d.uid,type:d.type,from:d.from,to:d.to,days,reason:d.reason,status:d.status,applied:todayISO(),note:''});
  save();closeModal();showToast('Leave record added!');setTab('leaves');
}

// — Export modal (stub) —
function openExportModal(){exportData();showToast('Exporting data...');}

// ══════════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════════
function showToast(msg){
  S.toast=msg;
  const el=document.getElementById('toast-el');
  if(el){el.textContent=msg;clearTimeout(el._t);el._t=setTimeout(()=>el.remove(),2800);}
  else{
    const t=document.createElement('div');
    t.className='toast';t.id='toast-el';t.textContent=msg;
    document.body.appendChild(t);
    t._t=setTimeout(()=>t.remove(),2800);
  }
}

initFromFirebase();

// ── Offline / Online Warning ──
function showOfflineBanner(){
  if(document.getElementById('offline-banner'))return;
  const b=document.createElement('div');
  b.id='offline-banner';
  b.style.cssText='position:fixed;top:0;left:0;right:0;background:#dc2626;color:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px;z-index:99999;font-family:DM Sans,sans-serif;font-size:13px;font-weight:500;box-shadow:0 2px 8px rgba(0,0,0,.3)';
  b.innerHTML=`
    <span style="font-size:18px">⚠️</span>
    <div>
      <div style="font-weight:700">No Internet Connection</div>
      <div style="font-size:11px;opacity:.9">Attendance and leave data cannot be saved or synced. Please connect to WiFi or mobile data.</div>
    </div>`;
  document.body.prepend(b);
}

function hideOfflineBanner(){
  const b=document.getElementById('offline-banner');
  if(b){
    b.style.background='#15803d';
    b.innerHTML=`<span style="font-size:18px">✅</span><div><div style="font-weight:700">Back Online</div><div style="font-size:11px;opacity:.9">Connection restored. Your data will sync normally.</div></div>`;
    setTimeout(()=>b.remove(),3000);
  }
}

// Check on load
if(!navigator.onLine) showOfflineBanner();

// Listen for changes
window.addEventListener('offline', showOfflineBanner);
window.addEventListener('online', hideOfflineBanner);

// Register Service Worker for PWA offline support
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js')
      .then(()=>console.log('SW registered'))
      .catch(e=>console.log('SW failed:',e));
  });
}

// PWA Install prompt
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredPrompt=e;
  // Show install banner after 3 seconds
  setTimeout(()=>{
    if(deferredPrompt){
      const banner=document.createElement('div');
      banner.id='pwa-banner';
      banner.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#1a4fa8;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;z-index:9999;font-family:DM Sans,sans-serif;font-size:13px;box-shadow:0 -2px 12px rgba(0,0,0,.2)';
      banner.innerHTML=`
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:22px">📲</span>
          <div><div style="font-weight:600">Install App</div><div style="font-size:11px;opacity:.8">Add REST HCMC to your home screen</div></div>
        </div>
        <div style="display:flex;gap:8px">
          <button onclick="document.getElementById('pwa-banner').remove();deferredPrompt=null;" style="background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px">Later</button>
          <button onclick="installPWA()" style="background:#fff;border:none;color:#1a4fa8;padding:6px 12px;border-radius:6px;cursor:pointer;font-weight:600;font-size:12px">Install</button>
        </div>`;
      document.body.appendChild(banner);
    }
  },3000);
});

function installPWA(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(()=>{
      deferredPrompt=null;
      const b=document.getElementById('pwa-banner');
      if(b)b.remove();
    });
  }
}
</script>
